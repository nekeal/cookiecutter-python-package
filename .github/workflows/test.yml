name: Sanity checks

on: [push]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11
        shell: bash
      - name: Check workflow files
        run: ./actionlint -color
        shell: bash

  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: "3.12"
      - name: Install prek
        run: uv pip install prek
      - run: prek run --all-files

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: "3.12"
      - run: uv pip install cookiecutter pytest pyyaml toml
      - run: uv sync
      - run: uv run pytest

  lint-generated-project:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install cookiecutter uv prek
      - run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11
      - name: Generate project
        run: |
          cookiecutter --config-file tests/context.yaml --no-input .
          cd example-project/
          # actionlint needs a git repo in place
          git init
          git config user.email "gha@users.noreply.github.com"
          git config user.name "gha"
          git add .
          git commit -m "initial commit"
      - name: Lint workflows
        run: |
          cd example-project
          ../actionlint -color
      - name: Lint project
        run: |
          cd example-project
          uv sync
          prek run --all-files
          uv run mkdocs build
